<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --bg: #0d0d12;
  --surface: #13131c;
  --surface2: #1a1a26;
  --surface3: #202030;
  --border: #252535;
  --border2: #30304a;
  --text: #e8e8f2;
  --text-dim: #7878a0;
  --text-light: #45455a;
  --accent: #7c5cfc;
  --accent2: #fc5c7d;
  --accent-bg: rgba(124,92,252,0.08);
  --todo-c: #5ba3f5;
  --todo-bg: rgba(91,163,245,0.1);
  --prog-c: #f5a623;
  --prog-bg: rgba(245,166,35,0.1);
  --done-c: #4ade80;
  --done-bg: rgba(74,222,128,0.1);
  --high-c: #fc5c7d;
  --med-c: #f5a623;
  --low-c: #5ba3f5;
  --radius: 14px;
  --sans: 'DM Sans', sans-serif;
  --serif: 'Fraunces', Georgia, serif;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
}
 
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  line-height: 1.5;
}
 
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
 
.layout {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}
 
/* ── Sidebar ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 0;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
 
.brand {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
 
.brand-name {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.3px;
  line-height: 1.1;
}
 
.brand-name span { color: var(--accent); }
 
.brand-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
  font-weight: 300;
  letter-spacing: 0.3px;
}
 
.nav-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-light);
  padding: 0 20px;
  margin: 10px 0 4px;
}
 
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  font-size: 13.5px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}
 
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
 
.nav-icon { font-size: 14px; width: 18px; text-align: center; opacity: 0.7; }
 
.nav-count {
  margin-left: auto;
  background: var(--surface3);
  border-radius: 999px;
  padding: 1px 8px;
  font-size: 11px;
  color: var(--text-dim);
}
 
.nav-item.active .nav-count { background: rgba(124,92,252,0.2); color: var(--accent); }
 
/* ── Main ── */
.main { flex: 1; padding: 36px 40px; min-width: 0; }
 
.page { display: none; }
.page.active { display: block; }
 
/* ── Page header ── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
  flex-wrap: wrap;
}
 
.page-title {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 500;
  letter-spacing: -0.5px;
  line-height: 1.15;
  color: var(--text);
}
 
.page-subtitle { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; font-weight: 300; }
 
/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
 
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
 
.stat-card:hover { border-color: var(--border2); }
 
.stat-num {
  font-family: var(--serif);
  font-size: 34px;
  font-weight: 500;
  line-height: 1;
  margin-bottom: 4px;
}
 
.stat-lbl { font-size: 11.5px; color: var(--text-dim); }
 
/* ── Toolbar ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
 
.chip {
  padding: 5px 14px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 500;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--sans);
}
 
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); border-color: var(--accent); color: white; }
 
/* ── Button ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 10px;
  font-family: var(--sans); font-size: 13.5px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap;
}
 
.btn-primary { background: var(--accent); color: white; box-shadow: 0 2px 12px rgba(124,92,252,0.35); }
.btn-primary:hover { background: #9070ff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,92,252,0.45); }
.btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); background: var(--surface3); }
.btn-danger { background: rgba(252,92,125,0.08); color: var(--high-c); border: 1px solid rgba(252,92,125,0.15); }
.btn-danger:hover { background: rgba(252,92,125,0.15); }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; }
 
/* ── Create form ── */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-md);
  animation: slideDown 0.25s ease;
}
 
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
 
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid.three { grid-template-columns: 2fr 1fr 1fr; }
.form-full { grid-column: 1/-1; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
 
label { font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }
 
input[type=text], input[type=date], textarea, select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 9px;
  padding: 9px 13px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13.5px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
 
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,92,252,0.12);
}
 
select option { background: var(--surface2); }
textarea { resize: vertical; min-height: 68px; }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
 
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
 
/* ── Task list ── */
.task-list { display: flex; flex-direction: column; gap: 6px; }
 
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 12px;
  align-items: start;
  transition: all 0.18s;
  box-shadow: var(--shadow);
  animation: fadeUp 0.2s ease both;
  border-left: 2px solid transparent;
}
 
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
 
.task-card:hover { border-color: var(--border2); background: var(--surface2); }
.task-card.status-todo { border-left-color: var(--todo-c); }
.task-card.status-in-progress { border-left-color: var(--prog-c); }
.task-card.status-done { border-left-color: var(--done-c); }
.task-card.drag-over { border-color: var(--accent) !important; background: var(--accent-bg) !important; }
.task-card.dragging { opacity: 0.35; }
 
.drag-handle {
  cursor: grab; color: var(--text-light);
  font-size: 15px; padding-top: 2px; user-select: none; line-height: 1;
  transition: color 0.15s;
}
.task-card:hover .drag-handle { color: var(--text-dim); }
 
.task-body { min-width: 0; }
 
.task-title {
  font-size: 14.5px; font-weight: 500; color: var(--text);
  line-height: 1.35; margin-bottom: 5px;
}
.task-title.done-title { text-decoration: line-through; color: var(--text-dim); }
 
.task-desc { font-size: 12.5px; color: var(--text-dim); margin-bottom: 8px; font-weight: 300; line-height: 1.5; }
 
.task-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
 
.status-pill {
  padding: 3px 10px; border-radius: 999px;
  font-size: 11.5px; font-weight: 500;
  cursor: pointer; border: 1px solid transparent;
  transition: all 0.15s; user-select: none;
}
.status-pill:hover { filter: brightness(1.15); }
.status-pill.todo { background: var(--todo-bg); color: var(--todo-c); border-color: rgba(91,163,245,0.2); }
.status-pill.in-progress { background: var(--prog-bg); color: var(--prog-c); border-color: rgba(245,166,35,0.2); }
.status-pill.done { background: var(--done-bg); color: var(--done-c); border-color: rgba(74,222,128,0.2); }
 
.priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.priority-dot.high { background: var(--high-c); }
.priority-dot.medium { background: var(--med-c); }
.priority-dot.low { background: var(--low-c); }
 
.meta-tag { font-size: 11.5px; color: var(--text-dim); display: flex; align-items: center; gap: 3px; }
.deadline-overdue { color: var(--high-c); font-weight: 500; }
.deadline-soon { color: var(--prog-c); font-weight: 500; }
 
.assignee-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.assignee-chip {
  background: var(--surface3); border: 1px solid var(--border2);
  border-radius: 999px; padding: 2px 9px;
  font-size: 11px; color: var(--text-dim);
}
 
.task-actions { display: flex; gap: 5px; align-items: flex-start; flex-shrink: 0; }
 
.task-edit {
  display: none; grid-column: 1/-1;
  border-top: 1px solid var(--border); padding-top: 14px; margin-top: 6px;
}
.task-edit.open { display: block; }
 
/* ── Empty ── */
.empty { text-align: center; padding: 70px 20px; color: var(--text-dim); }
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.2; }
.empty-title { font-family: var(--serif); font-size: 20px; font-weight: 300; margin-bottom: 6px; color: var(--text-dim); }
.empty-sub { font-size: 12.5px; font-weight: 300; }
 
/* ── Calendar ── */
.calendar-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow);
}
 
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
 
.cal-month { font-family: var(--serif); font-size: 22px; font-weight: 500; letter-spacing: -0.3px; }
 
.cal-nav { display: flex; gap: 6px; }
 
.cal-nav-btn {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text-dim); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.cal-nav-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
 
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
 
.cal-dow {
  text-align: center; font-size: 10.5px; font-weight: 600;
  color: var(--text-light); text-transform: uppercase; letter-spacing: 0.8px; padding: 6px 0;
}
 
.cal-day {
  aspect-ratio: 1; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding: 6px 4px 4px;
  cursor: pointer; transition: all 0.15s;
  border: 1px solid transparent; min-height: 52px; font-size: 13px;
}
 
.cal-day:hover { background: var(--surface2); border-color: var(--border); }
.cal-day.today { background: var(--accent-bg); border-color: rgba(124,92,252,0.3); }
.cal-day.today .cal-day-num { color: var(--accent); font-weight: 700; }
.cal-day.other-month { opacity: 0.25; }
.cal-day.has-tasks { background: var(--surface2); border-color: var(--border); }
 
.cal-day-num { font-size: 12.5px; font-weight: 400; margin-bottom: 4px; line-height: 1; }
 
.cal-task-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
 
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }
.cal-dot.todo { background: var(--todo-c); }
.cal-dot.in-progress { background: var(--prog-c); }
.cal-dot.done { background: var(--done-c); }
 
.cal-task-list { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
 
.cal-task-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: 8px; margin-bottom: 4px; background: var(--surface2);
  font-size: 13px; border: 1px solid var(--border);
}
 
/* ── Toast ── */
.toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 6px; z-index: 999; }
 
.toast {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 16px; font-size: 13px;
  display: flex; align-items: center; gap: 8px;
  animation: toastIn 0.25s ease; box-shadow: var(--shadow-md); min-width: 200px;
}
 
@keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.toast.success { border-left: 3px solid var(--done-c); }
.toast.error { border-left: 3px solid var(--high-c); }
.toast.info { border-left: 3px solid var(--accent); }
 
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 10px 12px; gap: 4px; }
  .brand { display: none; }
  .main { padding: 20px 16px; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .form-grid, .form-grid.three { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="layout">
 
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-name">Task<span>flow</span></div>
      <div class="brand-sub">Project manager</div>
    </div>
 
    <span class="nav-label">Views</span>
    <div class="nav-item active" onclick="showPage('tasks', this)">
      <span class="nav-icon">◈</span> All Tasks
      <span class="nav-count" id="nav-count-all">0</span>
    </div>
    <div class="nav-item" onclick="showPage('calendar', this)">
      <span class="nav-icon">▦</span> Calendar
    </div>
 
    <span class="nav-label" style="margin-top:14px">Filter</span>
    <div class="nav-item" onclick="sidebarFilter('todo', this)">
      <span class="nav-icon">○</span> To Do
      <span class="nav-count" id="nav-count-todo">0</span>
    </div>
    <div class="nav-item" onclick="sidebarFilter('in-progress', this)">
      <span class="nav-icon">◑</span> In Progress
      <span class="nav-count" id="nav-count-prog">0</span>
    </div>
    <div class="nav-item" onclick="sidebarFilter('done', this)">
      <span class="nav-icon">●</span> Done
      <span class="nav-count" id="nav-count-done">0</span>
    </div>
  </aside>
 
  <main class="main">
 
    <!-- Tasks Page -->
    <div class="page active" id="page-tasks">
      <div class="page-header">
        <div>
          <div class="page-title">All Tasks</div>
          <div class="page-subtitle" id="tasks-subtitle">Loading…</div>
        </div>
        <button class="btn btn-primary" onclick="toggleForm()">
          <span id="form-icon">＋</span> New Task
        </button>
      </div>
 
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="stat-total">—</div>
          <div class="stat-lbl">Total tasks</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--todo-c)" id="stat-todo">—</div>
          <div class="stat-lbl">To do</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--prog-c)" id="stat-prog">—</div>
          <div class="stat-lbl">In progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--done-c)" id="stat-done">—</div>
          <div class="stat-lbl">Done</div>
        </div>
      </div>
 
      <div class="form-card" id="create-form" style="display:none">
        <div class="form-grid three">
          <div class="form-group form-full">
            <label>Title *</label>
            <input type="text" id="new-title" placeholder="What needs to be done?" />
          </div>
          <div class="form-group form-full">
            <label>Description</label>
            <textarea id="new-desc" placeholder="Add details…"></textarea>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="new-priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label>Deadline</label>
            <input type="date" id="new-deadline" />
          </div>
          <div class="form-group">
            <label>Assignees</label>
            <input type="text" id="new-assignees" placeholder="Alice, Bob, Carol" />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-ghost" onclick="toggleForm()">Cancel</button>
          <button class="btn btn-primary" onclick="createTask()">Create Task</button>
        </div>
      </div>
 
      <div class="toolbar">
        <span style="font-size:11px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:0.8px">Filter:</span>
        <button class="chip active" onclick="setChipFilter('all',this)">All</button>
        <button class="chip" onclick="setChipFilter('todo',this)">To Do</button>
        <button class="chip" onclick="setChipFilter('in-progress',this)">In Progress</button>
        <button class="chip" onclick="setChipFilter('done',this)">Done</button>
      </div>
 
      <div class="task-list" id="task-list">
        <div class="empty"><div class="empty-icon">◌</div><div class="empty-title">Loading tasks…</div></div>
      </div>
    </div>
 
    <!-- Calendar Page -->
    <div class="page" id="page-calendar">
      <div class="page-header">
        <div>
          <div class="page-title">Calendar</div>
          <div class="page-subtitle">Tasks with deadlines</div>
        </div>
      </div>
      <div class="calendar-wrap">
        <div class="cal-header">
          <div class="cal-month" id="cal-month-label"></div>
          <div class="cal-nav">
            <button class="cal-nav-btn" onclick="calNav(-1)">←</button>
            <button class="cal-nav-btn" onclick="calNav(1)">→</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-task-list" id="cal-task-list" style="display:none"></div>
      </div>
    </div>
 
  </main>
</div>
 
<div class="toast-container" id="toasts"></div>
 
<script>
let allTasks = [];
let chipFilter = 'all';
const today = new Date();
let calYear = today.getFullYear(), calMonth = today.getMonth();
 
async function api(path, opts = {}) {
  const res = await fetch(path, { headers: {'Content-Type':'application/json'}, ...opts });
  return res.json();
}
 
async function load() {
  const d = await api('/api/tasks');
  allTasks = d.data || [];
  updateStats(); render(); renderCal();
}
 
function updateStats() {
  const todo = allTasks.filter(t => t.status === 'todo').length;
  const prog = allTasks.filter(t => t.status === 'in-progress').length;
  const done = allTasks.filter(t => t.status === 'done').length;
  document.getElementById('stat-total').textContent = allTasks.length;
  document.getElementById('stat-todo').textContent = todo;
  document.getElementById('stat-prog').textContent = prog;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('nav-count-all').textContent = allTasks.length;
  document.getElementById('nav-count-todo').textContent = todo;
  document.getElementById('nav-count-prog').textContent = prog;
  document.getElementById('nav-count-done').textContent = done;
  const now = new Date(); now.setHours(0,0,0,0);
  const overdue = allTasks.filter(t => t.deadline && new Date(t.deadline+'T00:00:00') < now && t.status !== 'done').length;
  document.getElementById('tasks-subtitle').textContent =
    `${allTasks.length} tasks · ${done} completed${overdue ? ` · ⚠ ${overdue} overdue` : ''}`;
}
 
function render() {
  const list = document.getElementById('task-list');
  const tasks = chipFilter === 'all' ? allTasks : allTasks.filter(t => t.status === chipFilter);
  if (!tasks.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">◌</div><div class="empty-title">No tasks here</div><div class="empty-sub">Add one with the New Task button above</div></div>`;
    return;
  }
  list.innerHTML = tasks.map(t => taskHTML(t)).join('');
  initDrag();
}
 
function taskHTML(t) {
  const dl = t.deadline ? new Date(t.deadline + 'T00:00:00') : null;
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = dl ? Math.round((dl - now) / 86400000) : null;
  let dlHTML = '';
  if (dl) {
    if (t.status !== 'done') {
      if (diff < 0) dlHTML = `<span class="meta-tag deadline-overdue">⚠ ${Math.abs(diff)}d overdue</span>`;
      else if (diff === 0) dlHTML = `<span class="meta-tag deadline-overdue">⚡ Due today</span>`;
      else if (diff <= 3) dlHTML = `<span class="meta-tag deadline-soon">⏰ ${diff}d left</span>`;
      else dlHTML = `<span class="meta-tag">📅 ${fmtDate(t.deadline)}</span>`;
    } else {
      dlHTML = `<span class="meta-tag">📅 ${fmtDate(t.deadline)}</span>`;
    }
  }
 
  const assignees = t.assignees ? t.assignees.split(',').map(a => a.trim()).filter(Boolean) : [];
 
  return `
  <div class="task-card status-${t.status}" id="card-${t.id}" draggable="true" data-id="${t.id}">
    <div class="drag-handle" title="Drag to reorder">⠿</div>
    <div class="task-body">
      <div class="task-title${t.status==='done'?' done-title':''}">${esc(t.title)}</div>
      ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
      <div class="task-meta">
        <span class="status-pill ${t.status}" onclick="cycleStatus('${t.id}')" title="Click to change status">${statusLabel(t.status)}</span>
        <div class="priority-dot ${t.priority}" title="${t.priority} priority"></div>
        <span class="meta-tag" style="color:var(--text-light);font-size:11px">${t.priority}</span>
        ${dlHTML}
        ${assignees.length ? `<div class="assignee-chips">${assignees.map(a=>`<span class="assignee-chip">👤 ${esc(a)}</span>`).join('')}</div>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${t.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="del('${t.id}')">✕</button>
    </div>
    <div class="task-edit" id="edit-${t.id}">
      <div class="form-grid three" style="margin-bottom:12px">
        <div class="form-group form-full">
          <label>Title</label>
          <input type="text" id="et-${t.id}" value="${esc(t.title)}" />
        </div>
        <div class="form-group form-full">
          <label>Description</label>
          <textarea id="ed-${t.id}">${esc(t.description)}</textarea>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="es-${t.id}">
            <option value="todo" ${t.status==='todo'?'selected':''}>To Do</option>
            <option value="in-progress" ${t.status==='in-progress'?'selected':''}>In Progress</option>
            <option value="done" ${t.status==='done'?'selected':''}>Done</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="ep-${t.id}">
            <option value="high" ${t.priority==='high'?'selected':''}>High</option>
            <option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option>
            <option value="low" ${t.priority==='low'?'selected':''}>Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Deadline</label>
          <input type="date" id="edl-${t.id}" value="${t.deadline||''}" />
        </div>
        <div class="form-group form-full">
          <label>Assignees (comma separated)</label>
          <input type="text" id="ea-${t.id}" value="${esc(t.assignees||'')}" placeholder="Alice, Bob" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${t.id}')">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="update('${t.id}')">Save</button>
      </div>
    </div>
  </div>`;
}
 
async function createTask() {
  const title = document.getElementById('new-title').value.trim();
  if (!title) { toast('Title is required', 'error'); return; }
  const d = await api('/api/tasks', {
    method: 'POST',
    body: JSON.stringify({
      title,
      description: document.getElementById('new-desc').value.trim(),
      priority: document.getElementById('new-priority').value,
      deadline: document.getElementById('new-deadline').value || null,
      assignees: document.getElementById('new-assignees').value.trim(),
    })
  });
  if (d.success) {
    allTasks.unshift(d.data);
    updateStats(); render(); renderCal();
    ['new-title','new-desc','new-deadline','new-assignees'].forEach(id => document.getElementById(id).value = '');
    toggleForm();
    toast('Task created!', 'success');
  } else toast(d.message, 'error');
}
 
async function cycleStatus(id) {
  const t = allTasks.find(x => x.id === id);
  if (!t) return;
  const next = {todo:'in-progress','in-progress':'done',done:'todo'}[t.status];
  const d = await api(`/api/tasks/${id}`, { method: 'PUT', body: JSON.stringify({ status: next }) });
  if (d.success) {
    const idx = allTasks.findIndex(x => x.id === id);
    allTasks[idx] = d.data;
    updateStats(); render(); renderCal();
    toast(`→ ${statusLabel(next)}`, 'success');
  }
}
 
async function update(id) {
  const d = await api(`/api/tasks/${id}`, {
    method: 'PUT',
    body: JSON.stringify({
      title: document.getElementById(`et-${id}`).value.trim(),
      description: document.getElementById(`ed-${id}`).value.trim(),
      status: document.getElementById(`es-${id}`).value,
      priority: document.getElementById(`ep-${id}`).value,
      deadline: document.getElementById(`edl-${id}`).value || null,
      assignees: document.getElementById(`ea-${id}`).value.trim(),
    })
  });
  if (d.success) {
    const idx = allTasks.findIndex(x => x.id === id);
    allTasks[idx] = d.data;
    updateStats(); render(); renderCal();
    toast('Saved!', 'success');
  } else toast(d.message, 'error');
}
 
async function del(id) {
  const d = await api(`/api/tasks/${id}`, { method: 'DELETE' });
  if (d.success) {
    allTasks = allTasks.filter(t => t.id !== id);
    updateStats(); render(); renderCal();
    toast('Deleted', 'info');
  }
}
 
// Drag & drop
let dragId = null;
function initDrag() {
  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('dragstart', () => {
      dragId = card.dataset.id;
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
      saveOrder();
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
      const list = document.getElementById('task-list');
      const cards = [...list.querySelectorAll('.task-card')];
      const fromIdx = cards.findIndex(c => c.dataset.id === dragId);
      const toIdx = cards.findIndex(c => c === card);
      if (fromIdx !== -1 && toIdx !== -1 && fromIdx !== toIdx) {
        const fromCard = cards[fromIdx];
        if (fromIdx < toIdx) card.after(fromCard); else card.before(fromCard);
        const newOrder = [...list.querySelectorAll('.task-card')].map(c => c.dataset.id);
        allTasks.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
      }
    });
  });
}
 
async function saveOrder() {
  const ids = [...document.getElementById('task-list').querySelectorAll('.task-card')].map(c => c.dataset.id);
  await api('/api/tasks/reorder', { method: 'PATCH', body: JSON.stringify({ ids }) });
}
 
// Calendar
function renderCal() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = `${months[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-dow">${d}</div>`).join('');
 
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
 
  const byDate = {};
  allTasks.forEach(t => { if (t.deadline) { const k = t.deadline.slice(0,10); (byDate[k] = byDate[k]||[]).push(t); } });
 
  for (let i = first - 1; i >= 0; i--)
    html += `<div class="cal-day other-month"><div class="cal-day-num">${prevDays-i}</div></div>`;
 
  const todayStr = today.toISOString().slice(0,10);
  for (let d = 1; d <= days; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tasks = byDate[ds] || [];
    html += `<div class="cal-day${ds===todayStr?' today':''}${tasks.length?' has-tasks':''}" onclick="showCalDay('${ds}')">
      <div class="cal-day-num">${d}</div>
      <div class="cal-task-dots">${tasks.slice(0,4).map(t=>`<div class="cal-dot ${t.status}"></div>`).join('')}</div>
    </div>`;
  }
 
  const remaining = (first + days) % 7;
  if (remaining) for (let d = 1; d <= 7 - remaining; d++)
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
 
  grid.innerHTML = html;
  document.getElementById('cal-task-list').style.display = 'none';
}
 
function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
}
 
function showCalDay(ds) {
  const tasks = allTasks.filter(t => t.deadline && t.deadline.slice(0,10) === ds);
  const panel = document.getElementById('cal-task-list');
  if (!tasks.length) { panel.style.display = 'none'; return; }
  const d = new Date(ds+'T00:00:00');
  panel.style.display = 'block';
  panel.innerHTML = `<div style="font-family:var(--serif);font-size:16px;font-weight:500;margin-bottom:10px;color:var(--text)">${d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>` +
    tasks.map(t => `<div class="cal-task-item">
      <span class="status-pill ${t.status}" style="font-size:11px;padding:2px 8px">${statusLabel(t.status)}</span>
      <span>${esc(t.title)}</span>
    </div>`).join('');
}
 
// UI
let formOpen = false;
function toggleForm() {
  formOpen = !formOpen;
  document.getElementById('create-form').style.display = formOpen ? 'block' : 'none';
  document.getElementById('form-icon').textContent = formOpen ? '✕' : '＋';
  if (formOpen) setTimeout(() => document.getElementById('new-title').focus(), 50);
}
 
function toggleEdit(id) {
  document.querySelectorAll('.task-edit').forEach(e => { if (e.id !== `edit-${id}`) e.classList.remove('open'); });
  document.getElementById(`edit-${id}`).classList.toggle('open');
}
 
function showPage(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if (page === 'calendar') renderCal();
}
 
function sidebarFilter(status, el) {
  chipFilter = status;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  showPage('tasks', el);
  render();
}
 
function setChipFilter(f, el) {
  chipFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}
 
function statusLabel(s) { return {todo:'To Do','in-progress':'In Progress',done:'Done'}[s]||s; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
 
function toast(msg, type='success') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}
 
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if (formOpen) toggleForm();
    document.querySelectorAll('.task-edit.open').forEach(el => el.classList.remove('open'));
  }
});
 
load();
</script>
</body>
</html>
