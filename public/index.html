<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskflow</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d12;--surface:#13131c;--surface2:#1a1a26;--surface3:#202030;
  --border:#252535;--border2:#30304a;
  --text:#e8e8f2;--text-dim:#7878a0;--text-light:#45455a;
  --accent:#7c5cfc;--accent2:#fc5c7d;--accent-bg:rgba(124,92,252,.08);
  --todo-c:#5ba3f5;--todo-bg:rgba(91,163,245,.1);
  --prog-c:#f5a623;--prog-bg:rgba(245,166,35,.1);
  --done-c:#4ade80;--done-bg:rgba(74,222,128,.1);
  --high-c:#fc5c7d;--med-c:#f5a623;--low-c:#5ba3f5;
  --radius:14px;
  --sans:'DM Sans',sans-serif;--serif:'Fraunces',Georgia,serif;
  --shadow:0 2px 8px rgba(0,0,0,.3);--shadow-md:0 8px 24px rgba(0,0,0,.4);
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,92,252,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,252,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

.layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* ── Sidebar ── */
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:28px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:0 20px 22px;border-bottom:1px solid var(--border);margin-bottom:14px}
.brand-name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.3px}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:11px;color:var(--text-dim);margin-top:2px;font-weight:300}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-light);padding:0 20px;margin:10px 0 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13.5px;color:var(--text-dim);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.nav-icon{font-size:14px;width:18px;text-align:center;opacity:.7}
.nav-count{margin-left:auto;background:var(--surface3);border-radius:999px;padding:1px 8px;font-size:11px;color:var(--text-dim)}
.nav-item.active .nav-count{background:rgba(124,92,252,.2);color:var(--accent)}

/* ── Main ── */
.main{flex:1;padding:36px 40px;min-width:0}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-title{font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.5px;line-height:1.15}
.page-subtitle{font-size:12.5px;color:var(--text-dim);margin-top:4px;font-weight:300}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:border-color .2s}
.stat-card:hover{border-color:var(--border2)}
.stat-num{font-family:var(--serif);font-size:34px;font-weight:500;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:11.5px;color:var(--text-dim)}

/* ── Toolbar ── */
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.chip{padding:5px 14px;border-radius:999px;font-size:12.5px;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-family:var(--sans);font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(124,92,252,.35)}
.btn-primary:hover{background:#9070ff;transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,92,252,.45)}
.btn-ghost{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);background:var(--surface3)}
.btn-danger{background:rgba(252,92,125,.08);color:var(--high-c);border:1px solid rgba(252,92,125,.15)}
.btn-danger:hover{background:rgba(252,92,125,.18)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}

/* ── Form ── */
.form-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:var(--shadow-md);animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.three{grid-template-columns:2fr 1fr 1fr}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px}
input[type=text],input[type=date],textarea,select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:9px 13px;color:var(--text);font-family:var(--sans);font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.12)}
select option{background:var(--surface2)}
textarea{resize:vertical;min-height:68px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ── DRAG & DROP (smooth & snappy) ── */
.task-list{display:flex;flex-direction:column;gap:6px;position:relative}

.task-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 18px;display:grid;grid-template-columns:22px 1fr auto;gap:12px;align-items:start;
  box-shadow:var(--shadow);border-left:2px solid transparent;
  transition:border-color .18s, background .18s, box-shadow .18s, opacity .18s;
  cursor:default;
  animation:fadeUp .22s ease both;
  position:relative;
  will-change:transform;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.task-card:hover{border-color:var(--border2);background:var(--surface2)}
.task-card.status-todo{border-left-color:var(--todo-c)}
.task-card.status-in-progress{border-left-color:var(--prog-c)}
.task-card.status-done{border-left-color:var(--done-c)}

/* ghost placeholder shown while dragging */
.task-card.drag-ghost{
  background:var(--accent-bg) !important;
  border:2px dashed var(--accent) !important;
  opacity:.5;
}
/* the card being dragged (floating clone) */
.drag-clone{
  position:fixed;pointer-events:none;z-index:9999;
  border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 2px var(--accent);
  opacity:.95;transform-origin:center center;
  transition:box-shadow .15s;
  animation:liftUp .15s ease both;
}
@keyframes liftUp{from{transform:scale(1) rotate(0deg)}to{transform:scale(1.03) rotate(.6deg)}}

.drag-handle{cursor:grab;color:var(--text-light);font-size:15px;padding-top:2px;user-select:none;line-height:1;transition:color .15s}
.drag-handle:active{cursor:grabbing}
.task-card:hover .drag-handle{color:var(--text-dim)}

/* drop indicator line */
.drop-line{
  height:3px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  margin:-2px 0;
  animation:dropLinePulse .5s ease infinite alternate;
  box-shadow:0 0 8px var(--accent);
}
@keyframes dropLinePulse{from{opacity:.7}to{opacity:1}}

/* ── Task card content ── */
.task-body{min-width:0}
.task-title{font-size:14.5px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:5px}
.task-title.done-title{text-decoration:line-through;color:var(--text-dim)}
.task-desc{font-size:12.5px;color:var(--text-dim);margin-bottom:8px;font-weight:300;line-height:1.5}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.status-pill{padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
.status-pill:hover{filter:brightness(1.15);transform:scale(1.04)}
.status-pill.todo{background:var(--todo-bg);color:var(--todo-c);border-color:rgba(91,163,245,.2)}
.status-pill.in-progress{background:var(--prog-bg);color:var(--prog-c);border-color:rgba(245,166,35,.2)}
.status-pill.done{background:var(--done-bg);color:var(--done-c);border-color:rgba(74,222,128,.2)}
.priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.priority-dot.high{background:var(--high-c)}.priority-dot.medium{background:var(--med-c)}.priority-dot.low{background:var(--low-c)}
.meta-tag{font-size:11.5px;color:var(--text-dim);display:flex;align-items:center;gap:3px}
.deadline-overdue{color:var(--high-c);font-weight:500}
.deadline-soon{color:var(--prog-c);font-weight:500}

/* ── Avatars ── */
.assignee-chips{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.avatar-chip{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);cursor:pointer;transition:transform .15s,box-shadow .15s;flex-shrink:0}
.avatar-chip:hover{transform:scale(1.12);box-shadow:0 0 0 2px var(--accent)}
.avatar-initial{width:26px;height:26px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:transform .15s;flex-shrink:0;text-transform:uppercase}
.avatar-initial:hover{transform:scale(1.1);border-color:var(--accent);color:var(--accent)}

.task-actions{display:flex;gap:5px;align-items:flex-start;flex-shrink:0}
.task-edit{display:none;grid-column:1/-1;border-top:1px solid var(--border);padding-top:14px;margin-top:6px}
.task-edit.open{display:block}

/* ── Avatar Manager Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;width:420px;max-width:90vw;box-shadow:var(--shadow-md);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:500;margin-bottom:18px}
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.avatar-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;position:relative}
.avatar-item img,.avatar-item .av-initial{width:52px;height:52px;border-radius:50%;border:2px solid var(--border2);transition:all .15s}
.avatar-item .av-initial{background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--text-dim);text-transform:uppercase}
.avatar-item:hover img,.avatar-item:hover .av-initial{border-color:var(--accent);transform:scale(1.08)}
.avatar-item-name{font-size:11px;color:var(--text-dim);text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.avatar-del{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--high-c);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;border:none}
.avatar-item:hover .avatar-del{display:flex}
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-bg)}
.upload-zone input{display:none}
.upload-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.upload-text{font-size:13px;color:var(--text-dim)}
.upload-text span{color:var(--accent);cursor:pointer}
.upload-preview{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:14px}
.upload-preview img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}

/* ── Empty ── */
.empty{text-align:center;padding:70px 20px;color:var(--text-dim)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.2}
.empty-title{font-family:var(--serif);font-size:20px;font-weight:300;margin-bottom:6px;color:var(--text-dim)}
.empty-sub{font-size:12.5px;font-weight:300}

/* ── Calendar ── */
.cal-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
.cal-month-label{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.3px}
.cal-nav{display:flex;gap:6px;align-items:center}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.view-tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;border:1px solid var(--border)}
.view-tab{padding:5px 14px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text-dim);transition:all .15s;border:none;background:transparent;font-family:var(--sans)}
.view-tab:hover{color:var(--text)}
.view-tab.active{background:var(--accent);color:#fff}
.calendar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}

/* Month grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:10.5px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.8px;padding:6px 0}
.cal-day{border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 4px 4px;cursor:pointer;transition:all .15s;border:1px solid transparent;min-height:62px;font-size:13px}
.cal-day:hover{background:var(--surface2);border-color:var(--border)}
.cal-day.today{background:var(--accent-bg);border-color:rgba(124,92,252,.3)}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:700}
.cal-day.other-month{opacity:.25}
.cal-day.has-tasks{background:var(--surface2);border-color:var(--border)}
.cal-day-num{font-size:12.5px;margin-bottom:4px;line-height:1}
.cal-task-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-dot.todo{background:var(--todo-c)}.cal-dot.in-progress{background:var(--prog-c)}.cal-dot.done{background:var(--done-c)}

/* Week grid */
.week-grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.week-header-cell{background:var(--surface2);padding:10px 8px;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:11px}
.week-header-cell.today-col{background:var(--accent-bg)}
.week-day-name{font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;font-size:10px}
.week-day-num{font-family:var(--serif);font-size:18px;font-weight:500;line-height:1.2}
.week-day-num.today-num{color:var(--accent)}
.week-time-col{background:var(--surface2);border-right:1px solid var(--border)}
.week-time-slot{height:36px;padding:0 8px;display:flex;align-items:flex-start;justify-content:flex-end;font-size:10px;color:var(--text-light);border-bottom:1px solid var(--border);padding-top:3px}
.week-day-col{border-right:1px solid var(--border);position:relative}
.week-day-col:last-child{border-right:none}
.week-cell{height:36px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.week-cell:hover{background:var(--accent-bg)}
.week-cell.today-col{background:rgba(124,92,252,.04)}
.week-task-pill{position:absolute;left:2px;right:2px;border-radius:6px;padding:2px 6px;font-size:10.5px;font-weight:500;z-index:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:filter .15s}
.week-task-pill:hover{filter:brightness(1.15)}
.week-task-pill.todo{background:rgba(91,163,245,.25);color:var(--todo-c)}
.week-task-pill.in-progress{background:rgba(245,166,35,.25);color:var(--prog-c)}
.week-task-pill.done{background:rgba(74,222,128,.2);color:var(--done-c)}

/* Year grid */
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.year-month-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s}
.year-month-card:hover{border-color:var(--accent);background:var(--surface3)}
.year-month-name{font-family:var(--serif);font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text)}
.year-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.year-mini-day{width:100%;aspect-ratio:1;border-radius:3px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-light);position:relative}
.year-mini-day.has-tasks{background:rgba(124,92,252,.25);color:var(--accent)}
.year-mini-day.today{background:var(--accent);color:#fff}
.year-mini-day.other{opacity:.2}

/* Selected day panel */
.cal-task-list{margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.cal-task-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:4px;background:var(--surface2);font-size:13px;border:1px solid var(--border)}

/* ── Toast ── */
.toast-container{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:999}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:8px;animation:toastIn .25s ease;box-shadow:var(--shadow-md);min-width:200px}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast.success{border-left:3px solid var(--done-c)}.toast.error{border-left:3px solid var(--high-c)}.toast.info{border-left:3px solid var(--accent)}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:10px 12px;gap:4px}
  .brand{display:none}
  .main{padding:20px 16px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .form-grid,.form-grid.three{grid-template-columns:1fr}
  .year-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-name">Task<span>flow</span></div>
      <div class="brand-sub">Project manager</div>
    </div>
    <span class="nav-label">Views</span>
    <div class="nav-item active" onclick="showPage('tasks',this)"><span class="nav-icon">◈</span>All Tasks<span class="nav-count" id="nav-all">0</span></div>
    <div class="nav-item" onclick="showPage('calendar',this)"><span class="nav-icon">▦</span>Calendar</div>
    <span class="nav-label" style="margin-top:14px">Filter</span>
    <div class="nav-item" onclick="sidebarFilter('todo',this)"><span class="nav-icon">○</span>To Do<span class="nav-count" id="nav-todo">0</span></div>
    <div class="nav-item" onclick="sidebarFilter('in-progress',this)"><span class="nav-icon">◑</span>In Progress<span class="nav-count" id="nav-prog">0</span></div>
    <div class="nav-item" onclick="sidebarFilter('done',this)"><span class="nav-icon">●</span>Done<span class="nav-count" id="nav-done">0</span></div>
  </aside>

  <main class="main">

    <!-- Tasks -->
    <div class="page active" id="page-tasks">
      <div class="page-header">
        <div>
          <div class="page-title">All Tasks</div>
          <div class="page-subtitle" id="tasks-sub">Loading…</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="openAvatarModal()">👤 Avatars</button>
          <button class="btn btn-primary" onclick="toggleForm()"><span id="form-icon">＋</span> New Task</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Total</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--todo-c)" id="s-todo">—</div><div class="stat-lbl">To Do</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--prog-c)" id="s-prog">—</div><div class="stat-lbl">In Progress</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--done-c)" id="s-done">—</div><div class="stat-lbl">Done</div></div>
      </div>

      <div class="form-card" id="create-form" style="display:none">
        <div class="form-grid three">
          <div class="form-group form-full"><label>Title *</label><input type="text" id="new-title" placeholder="What needs to be done?"/></div>
          <div class="form-group form-full"><label>Description</label><textarea id="new-desc" placeholder="Add details…"></textarea></div>
          <div class="form-group"><label>Priority</label><select id="new-pri"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
          <div class="form-group"><label>Deadline</label><input type="date" id="new-dl"/></div>
          <div class="form-group"><label>Assignees</label><input type="text" id="new-asgn" placeholder="Alice, Bob, Carol"/></div>
        </div>
        <div class="form-actions">
          <button class="btn btn-ghost" onclick="toggleForm()">Cancel</button>
          <button class="btn btn-primary" onclick="createTask()">Create Task</button>
        </div>
      </div>

      <div class="toolbar">
        <span style="font-size:11px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.8px">Filter:</span>
        <button class="chip active" onclick="setFilter('all',this)">All</button>
        <button class="chip" onclick="setFilter('todo',this)">To Do</button>
        <button class="chip" onclick="setFilter('in-progress',this)">In Progress</button>
        <button class="chip" onclick="setFilter('done',this)">Done</button>
      </div>

      <div class="task-list" id="task-list">
        <div class="empty"><div class="empty-icon">◌</div><div class="empty-title">Loading…</div></div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="page" id="page-calendar">
      <div class="page-header">
        <div><div class="page-title">Calendar</div><div class="page-subtitle">Tasks with deadlines</div></div>
      </div>
      <div class="calendar-wrap">
        <div class="cal-header-row">
          <div class="cal-month-label" id="cal-label"></div>
          <div class="cal-nav">
            <div class="view-tabs">
              <button class="view-tab active" onclick="setCalView('month',this)">Month</button>
              <button class="view-tab" onclick="setCalView('week',this)">Week</button>
              <button class="view-tab" onclick="setCalView('year',this)">Year</button>
            </div>
            <button class="cal-nav-btn" onclick="calNav(-1)">←</button>
            <button class="cal-nav-btn" onclick="calNav(1)">→</button>
          </div>
        </div>
        <div id="cal-body"></div>
        <div class="cal-task-list" id="cal-detail" style="display:none"></div>
      </div>
    </div>

  </main>
</div>

<!-- Avatar Modal -->
<div class="modal-bg" id="avatar-modal" style="display:none" onclick="closeAvatarModal(event)">
  <div class="modal">
    <div class="modal-title">Manage Avatars</div>
    <div class="avatar-grid" id="avatar-grid"></div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" onchange="previewFile(this)"/>
      <div class="upload-icon">📷</div>
      <div class="upload-text">Drop image or <span>browse</span></div>
    </div>
    <div class="upload-preview" id="upload-preview" style="display:none">
      <img id="preview-img" src="" alt="preview"/>
      <div style="flex:1">
        <div class="form-group" style="margin-bottom:8px">
          <label>Name</label>
          <input type="text" id="avatar-name" placeholder="e.g. alice"/>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeAvatarModal()">Close</button>
      <button class="btn btn-primary" id="save-avatar-btn" style="display:none" onclick="saveAvatar()">Save Avatar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ── State ──────────────────────────────────────
let allTasks=[], avatars={}, chipFilter='all';
let calView='month';
const today=new Date();
let calYear=today.getFullYear(), calMonth=today.getMonth();
let calWeekOffset=0;

// ── API ────────────────────────────────────────
async function api(path,opts={}){
  const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts});
  return r.json();
}

async function load(){
  const [td,av]=await Promise.all([api('/api/tasks'),api('/api/avatars')]);
  allTasks=td.data||[];
  avatars=av.data||{};
  updateStats();render();renderCal();
}

// ── Stats ──────────────────────────────────────
function updateStats(){
  const todo=allTasks.filter(t=>t.status==='todo').length;
  const prog=allTasks.filter(t=>t.status==='in-progress').length;
  const done=allTasks.filter(t=>t.status==='done').length;
  document.getElementById('s-total').textContent=allTasks.length;
  document.getElementById('s-todo').textContent=todo;
  document.getElementById('s-prog').textContent=prog;
  document.getElementById('s-done').textContent=done;
  document.getElementById('nav-all').textContent=allTasks.length;
  document.getElementById('nav-todo').textContent=todo;
  document.getElementById('nav-prog').textContent=prog;
  document.getElementById('nav-done').textContent=done;
  const now=new Date();now.setHours(0,0,0,0);
  const ov=allTasks.filter(t=>t.deadline&&new Date(t.deadline+'T00:00:00')<now&&t.status!=='done').length;
  document.getElementById('tasks-sub').textContent=`${allTasks.length} tasks · ${done} done${ov?` · ⚠ ${ov} overdue`:''}`;
}

// ── Render tasks ───────────────────────────────
function render(){
  const list=document.getElementById('task-list');
  const tasks=chipFilter==='all'?allTasks:allTasks.filter(t=>t.status===chipFilter);
  if(!tasks.length){list.innerHTML=`<div class="empty"><div class="empty-icon">◌</div><div class="empty-title">No tasks here</div><div class="empty-sub">Add one above</div></div>`;return;}
  list.innerHTML=tasks.map(t=>taskHTML(t)).join('');
  initDrag();
}

function taskHTML(t){
  const dl=t.deadline?new Date(t.deadline+'T00:00:00'):null;
  const now=new Date();now.setHours(0,0,0,0);
  const diff=dl?Math.round((dl-now)/86400000):null;
  let dlHTML='';
  if(dl){
    if(t.status!=='done'){
      if(diff<0) dlHTML=`<span class="meta-tag deadline-overdue">⚠ ${Math.abs(diff)}d overdue</span>`;
      else if(diff===0) dlHTML=`<span class="meta-tag deadline-overdue">⚡ Due today</span>`;
      else if(diff<=3) dlHTML=`<span class="meta-tag deadline-soon">⏰ ${diff}d left</span>`;
      else dlHTML=`<span class="meta-tag">📅 ${fmtDate(t.deadline)}</span>`;
    }else dlHTML=`<span class="meta-tag">📅 ${fmtDate(t.deadline)}</span>`;
  }

  const asgns=t.assignees?t.assignees.split(',').map(a=>a.trim()).filter(Boolean):[];
  const aHTML=asgns.length?`<div class="assignee-chips">${asgns.map(a=>{
    const key=a.toLowerCase();
    return avatars[key]
      ?`<img class="avatar-chip" src="${avatars[key]}" title="${esc(a)}" alt="${esc(a)}" onclick="openAvatarModal()">`
      :`<div class="avatar-initial" title="${esc(a)}" onclick="openAvatarModal()">${a.charAt(0)}</div>`;
  }).join('')}</div>`:'';

  return `<div class="task-card status-${t.status}" id="card-${t.id}" data-id="${t.id}">
    <div class="drag-handle" title="Drag to reorder">⠿</div>
    <div class="task-body">
      <div class="task-title${t.status==='done'?' done-title':''}">${esc(t.title)}</div>
      ${t.description?`<div class="task-desc">${esc(t.description)}</div>`:''}
      <div class="task-meta">
        <span class="status-pill ${t.status}" onclick="cycleStatus('${t.id}')" title="Click to cycle status">${statusLabel(t.status)}</span>
        <div class="priority-dot ${t.priority}" title="${t.priority}"></div>
        <span class="meta-tag" style="color:var(--text-light);font-size:11px">${t.priority}</span>
        ${dlHTML}${aHTML}
      </div>
    </div>
    <div class="task-actions">
      <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${t.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="del('${t.id}')">✕</button>
    </div>
    <div class="task-edit" id="edit-${t.id}">
      <div class="form-grid three" style="margin-bottom:12px">
        <div class="form-group form-full"><label>Title</label><input type="text" id="et-${t.id}" value="${esc(t.title)}"/></div>
        <div class="form-group form-full"><label>Description</label><textarea id="ed-${t.id}">${esc(t.description)}</textarea></div>
        <div class="form-group"><label>Status</label><select id="es-${t.id}"><option value="todo" ${t.status==='todo'?'selected':''}>To Do</option><option value="in-progress" ${t.status==='in-progress'?'selected':''}>In Progress</option><option value="done" ${t.status==='done'?'selected':''}>Done</option></select></div>
        <div class="form-group"><label>Priority</label><select id="ep-${t.id}"><option value="high" ${t.priority==='high'?'selected':''}>High</option><option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option><option value="low" ${t.priority==='low'?'selected':''}>Low</option></select></div>
        <div class="form-group"><label>Deadline</label><input type="date" id="edl-${t.id}" value="${t.deadline||''}"/></div>
        <div class="form-group form-full"><label>Assignees (comma separated)</label><input type="text" id="ea-${t.id}" value="${esc(t.assignees||'')}" placeholder="Alice, Bob"/></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleEdit('${t.id}')">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="update('${t.id}')">Save</button>
      </div>
    </div>
  </div>`;
}

// ── CRUD ───────────────────────────────────────
async function createTask(){
  const title=document.getElementById('new-title').value.trim();
  if(!title){toast('Title is required','error');return;}
  const d=await api('/api/tasks',{method:'POST',body:JSON.stringify({title,description:document.getElementById('new-desc').value.trim(),priority:document.getElementById('new-pri').value,deadline:document.getElementById('new-dl').value||null,assignees:document.getElementById('new-asgn').value.trim()})});
  if(d.success){allTasks.unshift(d.data);updateStats();render();renderCal();['new-title','new-desc','new-dl','new-asgn'].forEach(id=>document.getElementById(id).value='');toggleForm();toast('Task created!','success');}
  else toast(d.message,'error');
}

async function cycleStatus(id){
  const t=allTasks.find(x=>x.id===id);if(!t)return;
  const next={todo:'in-progress','in-progress':'done',done:'todo'}[t.status];
  const d=await api(`/api/tasks/${id}`,{method:'PUT',body:JSON.stringify({status:next})});
  if(d.success){const i=allTasks.findIndex(x=>x.id===id);allTasks[i]=d.data;updateStats();render();renderCal();toast(`→ ${statusLabel(next)}`);}
}

async function update(id){
  const d=await api(`/api/tasks/${id}`,{method:'PUT',body:JSON.stringify({title:document.getElementById(`et-${id}`).value.trim(),description:document.getElementById(`ed-${id}`).value.trim(),status:document.getElementById(`es-${id}`).value,priority:document.getElementById(`ep-${id}`).value,deadline:document.getElementById(`edl-${id}`).value||null,assignees:document.getElementById(`ea-${id}`).value.trim()})});
  if(d.success){const i=allTasks.findIndex(x=>x.id===id);allTasks[i]=d.data;updateStats();render();renderCal();toast('Saved!','success');}
  else toast(d.message,'error');
}

async function del(id){
  const d=await api(`/api/tasks/${id}`,{method:'DELETE'});
  if(d.success){allTasks=allTasks.filter(t=>t.id!==id);updateStats();render();renderCal();toast('Deleted','info');}
}

// ── Smooth Drag & Drop ─────────────────────────
let dragId=null,clone=null,ghostEl=null,dragIndex=-1;

function initDrag(){
  const list=document.getElementById('task-list');
  list.querySelectorAll('.task-card').forEach(card=>{
    const handle=card.querySelector('.drag-handle');
    handle.addEventListener('mousedown',e=>startDrag(e,card));
  });
}

function startDrag(e,card){
  e.preventDefault();
  dragId=card.dataset.id;
  const rect=card.getBoundingClientRect();

  // Create floating clone
  clone=card.cloneNode(true);
  clone.className='task-card drag-clone';
  clone.style.cssText=`width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;`;
  document.body.appendChild(clone);

  // Turn original into ghost
  card.classList.add('drag-ghost');
  ghostEl=card;
  dragIndex=[...document.getElementById('task-list').querySelectorAll('.task-card')].indexOf(card);

  const offX=e.clientX-rect.left, offY=e.clientY-rect.top;

  function onMove(e){
    clone.style.left=(e.clientX-offX)+'px';
    clone.style.top=(e.clientY-offY)+'px';

    // Find target card
    const cards=[...document.getElementById('task-list').querySelectorAll('.task-card:not(.drag-ghost)')];
    let target=null, targetIdx=-1;
    cards.forEach((c,i)=>{
      const r=c.getBoundingClientRect();
      if(e.clientY>r.top&&e.clientY<r.bottom){target=c;targetIdx=i;}
    });

    if(target&&target!==ghostEl){
      const list=document.getElementById('task-list');
      const allCards=[...list.querySelectorAll('.task-card')];
      const ghostIdx=allCards.indexOf(ghostEl);
      const tIdx=allCards.indexOf(target);
      if(ghostIdx<tIdx) target.after(ghostEl);
      else target.before(ghostEl);
      // sync allTasks
      const newOrder=[...list.querySelectorAll('.task-card')].map(c=>c.dataset.id);
      allTasks.sort((a,b)=>newOrder.indexOf(a.id)-newOrder.indexOf(b.id));
    }
  }

  function onUp(){
    // Snap clone back to ghost position
    const gr=ghostEl.getBoundingClientRect();
    clone.style.transition='all .2s cubic-bezier(.4,0,.2,1)';
    clone.style.left=gr.left+'px';
    clone.style.top=gr.top+'px';
    clone.style.transform='scale(1) rotate(0deg)';
    clone.style.opacity='0';
    setTimeout(()=>{
      clone.remove();clone=null;
      ghostEl.classList.remove('drag-ghost');ghostEl=null;
      dragId=null;
      saveOrder();
    },200);
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
  }

  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

async function saveOrder(){
  const ids=[...document.getElementById('task-list').querySelectorAll('.task-card')].map(c=>c.dataset.id);
  await api('/api/tasks/reorder',{method:'PATCH',body:JSON.stringify({ids})});
}

// ── Calendar ───────────────────────────────────
function setCalView(v,el){
  calView=v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(v==='week')calWeekOffset=0;
  renderCal();
}

function calNav(dir){
  if(calView==='month'){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}}
  else if(calView==='week') calWeekOffset+=dir;
  else if(calView==='year') calYear+=dir;
  renderCal();
}

function renderCal(){
  document.getElementById('cal-detail').style.display='none';
  if(calView==='month') renderMonth();
  else if(calView==='week') renderWeek();
  else renderYear();
}

function getByDate(){
  const m={};
  allTasks.forEach(t=>{if(t.deadline){const k=t.deadline.slice(0,10);(m[k]=m[k]||[]).push(t);}});
  return m;
}

function renderMonth(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-label').textContent=`${months[calMonth]} ${calYear}`;
  const byDate=getByDate();
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const prev=new Date(calYear,calMonth,0).getDate();
  const todayStr=today.toISOString().slice(0,10);
  let html=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=first-1;i>=0;i--) html+=`<div class="cal-day other-month"><div class="cal-day-num">${prev-i}</div></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ts=byDate[ds]||[];
    html+=`<div class="cal-day${ds===todayStr?' today':''}${ts.length?' has-tasks':''}" onclick="showDay('${ds}')"><div class="cal-day-num">${d}</div><div class="cal-task-dots">${ts.slice(0,4).map(t=>`<div class="cal-dot ${t.status}"></div>`).join('')}</div></div>`;
  }
  const rem=(first+days)%7;
  if(rem) for(let d=1;d<=7-rem;d++) html+=`<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  document.getElementById('cal-body').innerHTML=`<div class="cal-grid">${html}</div>`;
}

function renderWeek(){
  const base=new Date(today);
  base.setDate(base.getDate()-base.getDay()+calWeekOffset*7);
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(base);d.setDate(base.getDate()+i);days.push(d);}
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('cal-label').textContent=`Week of ${months[days[0].getMonth()]} ${days[0].getDate()}, ${days[0].getFullYear()}`;
  const todayStr=today.toISOString().slice(0,10);
  const byDate=getByDate();
  const hours=Array.from({length:24},(_,i)=>i);
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html=`<div class="week-grid">`;
  // corner
  html+=`<div class="week-header-cell" style="border-right:1px solid var(--border)"></div>`;
  // day headers
  days.forEach(d=>{
    const ds=d.toISOString().slice(0,10);
    const isToday=ds===todayStr;
    html+=`<div class="week-header-cell${isToday?' today-col':''}"><div class="week-day-name">${dayNames[d.getDay()]}</div><div class="week-day-num${isToday?' today-num':''}">${d.getDate()}</div></div>`;
  });
  // time rows
  hours.forEach(h=>{
    html+=`<div class="week-time-col"><div class="week-time-slot">${h===0?'':String(h).padStart(2,'0')+':00'}</div></div>`;
    days.forEach(d=>{
      const ds=d.toISOString().slice(0,10);
      const isToday=ds===todayStr;
      const tasks=(byDate[ds]||[]);
      let pills='';
      if(h===8&&tasks.length){
        pills=tasks.map(t=>`<div class="week-task-pill ${t.status}" onclick="showDay('${ds}')" title="${esc(t.title)}">${esc(t.title)}</div>`).join('');
      }
      html+=`<div class="week-cell${isToday?' today-col':''}" style="position:relative">${pills}</div>`;
    });
  });
  html+=`</div>`;
  document.getElementById('cal-body').innerHTML=html;
}

function renderYear(){
  document.getElementById('cal-label').textContent=String(calYear);
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const byDate=getByDate();
  const todayStr=today.toISOString().slice(0,10);
  let html='<div class="year-grid">';
  months.forEach((mname,mi)=>{
    const first=new Date(calYear,mi,1).getDay();
    const days=new Date(calYear,mi+1,0).getDate();
    let mini='<div class="year-mini-grid">';
    ['S','M','T','W','T','F','S'].forEach(d=>mini+=`<div style="font-size:8px;color:var(--text-light);text-align:center;padding:1px">${d}</div>`);
    for(let i=0;i<first;i++) mini+=`<div class="year-mini-day other"></div>`;
    for(let d=1;d<=days;d++){
      const ds=`${calYear}-${String(mi+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const has=byDate[ds]&&byDate[ds].length;
      mini+=`<div class="year-mini-day${ds===todayStr?' today':has?' has-tasks':''}" onclick="goToMonth(${mi},'${ds}')" title="${has?byDate[ds].length+' task(s)':''}">${d}</div>`;
    }
    mini+='</div>';
    html+=`<div class="year-month-card" onclick="goToMonth(${mi})"><div class="year-month-name">${mname}</div>${mini}</div>`;
  });
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function goToMonth(mi,ds){
  calMonth=mi;calView='month';
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.view-tab').classList.add('active');
  renderCal();
  if(ds) setTimeout(()=>showDay(ds),50);
}

function showDay(ds){
  const tasks=allTasks.filter(t=>t.deadline&&t.deadline.slice(0,10)===ds);
  const panel=document.getElementById('cal-detail');
  if(!tasks.length){panel.style.display='none';return;}
  const d=new Date(ds+'T00:00:00');
  panel.style.display='block';
  panel.innerHTML=`<div style="font-family:var(--serif);font-size:16px;font-weight:500;margin-bottom:10px">${d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>`
    +tasks.map(t=>`<div class="cal-task-item"><span class="status-pill ${t.status}" style="font-size:11px;padding:2px 8px">${statusLabel(t.status)}</span><span>${esc(t.title)}</span></div>`).join('');
}

// ── Avatar Modal ───────────────────────────────
let previewData=null;

function openAvatarModal(){
  renderAvatarGrid();
  document.getElementById('avatar-modal').style.display='flex';
  previewData=null;
  document.getElementById('upload-preview').style.display='none';
  document.getElementById('save-avatar-btn').style.display='none';
  document.getElementById('avatar-name').value='';
  document.getElementById('file-input').value='';
}

function closeAvatarModal(e){
  if(!e||e.target===document.getElementById('avatar-modal'))
    document.getElementById('avatar-modal').style.display='none';
}

function renderAvatarGrid(){
  const grid=document.getElementById('avatar-grid');
  const keys=Object.keys(avatars);
  if(!keys.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;color:var(--text-dim);font-size:13px;padding:12px">No avatars yet</div>`;return;}
  grid.innerHTML=keys.map(k=>`
    <div class="avatar-item">
      <img src="${avatars[k]}" alt="${k}" style="width:52px;height:52px;border-radius:50%;border:2px solid var(--border2)"/>
      <div class="avatar-item-name">${k}</div>
      <button class="avatar-del" onclick="delAvatar('${k}')">✕</button>
    </div>`).join('');
}

function previewFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    previewData=e.target.result;
    document.getElementById('preview-img').src=previewData;
    document.getElementById('upload-preview').style.display='flex';
    document.getElementById('save-avatar-btn').style.display='inline-flex';
    // auto-fill name from filename
    const name=file.name.replace(/\.[^.]+$/,'').toLowerCase().replace(/[^a-z0-9]/g,'');
    document.getElementById('avatar-name').value=name;
  };
  reader.readAsDataURL(file);
}

async function saveAvatar(){
  const name=document.getElementById('avatar-name').value.trim().toLowerCase();
  if(!name){toast('Enter a name','error');return;}
  if(!previewData){toast('Select an image','error');return;}
  const d=await api('/api/avatars',{method:'POST',body:JSON.stringify({name,image_data:previewData})});
  if(d.success){
    avatars[name]=previewData;
    renderAvatarGrid();render();
    document.getElementById('upload-preview').style.display='none';
    document.getElementById('save-avatar-btn').style.display='none';
    document.getElementById('file-input').value='';
    previewData=null;
    toast('Avatar saved!','success');
  }else toast(d.message,'error');
}

async function delAvatar(name){
  const d=await api(`/api/avatars/${name}`,{method:'DELETE'});
  if(d.success){delete avatars[name];renderAvatarGrid();render();toast('Removed','info');}
}

// Drag & drop on upload zone
const zone=document.getElementById('upload-zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover');});
zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
zone.addEventListener('drop',e=>{
  e.preventDefault();zone.classList.remove('dragover');
  const f=e.dataTransfer.files[0];
  if(f){const inp=document.getElementById('file-input');const dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;previewFile(inp);}
});

// ── UI helpers ─────────────────────────────────
let formOpen=false;
function toggleForm(){
  formOpen=!formOpen;
  document.getElementById('create-form').style.display=formOpen?'block':'none';
  document.getElementById('form-icon').textContent=formOpen?'✕':'＋';
  if(formOpen)setTimeout(()=>document.getElementById('new-title').focus(),50);
}

function toggleEdit(id){
  document.querySelectorAll('.task-edit').forEach(e=>{if(e.id!==`edit-${id}`)e.classList.remove('open');});
  document.getElementById(`edit-${id}`).classList.toggle('open');
}

function showPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(page==='calendar')renderCal();
}

function sidebarFilter(status,el){
  chipFilter=status;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  showPage('tasks',el);render();
}

function setFilter(f,el){
  chipFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');render();
}

function statusLabel(s){return{todo:'To Do','in-progress':'In Progress',done:'Done'}[s]||s;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}

function toast(msg,type='success'){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),2800);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(formOpen)toggleForm();
    document.getElementById('avatar-modal').style.display='none';
    document.querySelectorAll('.task-edit.open').forEach(el=>el.classList.remove('open'));
  }
});

load();
</script>
